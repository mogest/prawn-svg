<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <style>
    text { font-family: sans-serif; font-size: 12px; }
    .label { font-size: 14px; font-weight: bold; }
  </style>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="20" font-weight="bold">switch Element with Conditional Processing</text>

  <!-- Test 1: Basic switch - first child wins -->
  <text x="20" y="70" class="label">1. Basic switch (first child rendered):</text>
  <switch>
    <rect x="20" y="80" width="120" height="60" fill="green"/>
    <rect x="20" y="80" width="120" height="60" fill="red"/>
  </switch>
  <text x="160" y="115" fill="#666">Green rect should show (first match)</text>

  <!-- Test 2: requiredFeatures with supported feature -->
  <text x="20" y="170" class="label">2. requiredFeatures (supported - Shape):</text>
  <switch>
    <rect requiredFeatures="http://www.w3.org/TR/SVG11/feature#Shape" x="20" y="180" width="120" height="60" fill="green"/>
    <rect x="20" y="180" width="120" height="60" fill="red"/>
  </switch>
  <text x="160" y="215" fill="#666">Green rect (Shape is supported)</text>

  <!-- Test 3: requiredFeatures with unsupported feature -->
  <text x="20" y="270" class="label">3. requiredFeatures (unsupported - Filter):</text>
  <switch>
    <rect requiredFeatures="http://www.w3.org/TR/SVG11/feature#Filter" x="20" y="280" width="120" height="60" fill="red"/>
    <rect x="20" y="280" width="120" height="60" fill="green"/>
  </switch>
  <text x="160" y="315" fill="#666">Green rect (Filter not supported, fallback used)</text>

  <!-- Test 4: requiredExtensions always fails -->
  <text x="20" y="370" class="label">4. requiredExtensions (always fails):</text>
  <switch>
    <rect requiredExtensions="http://example.org/foo" x="20" y="380" width="120" height="60" fill="red"/>
    <circle cx="80" cy="410" r="30" fill="green"/>
  </switch>
  <text x="160" y="415" fill="#666">Green circle (no extensions supported)</text>

  <!-- Test 5: systemLanguage matching (default=en) -->
  <text x="400" y="70" class="label">5. systemLanguage (default en):</text>
  <switch>
    <text x="400" y="100" systemLanguage="en">English text selected</text>
    <text x="400" y="100" systemLanguage="fr">Texte français sélectionné</text>
    <text x="400" y="100">Fallback text</text>
  </switch>

  <!-- Test 6: systemLanguage prefix matching -->
  <text x="400" y="140" class="label">6. systemLanguage prefix match (en matches en-US):</text>
  <switch>
    <text x="400" y="170" systemLanguage="en-US">English (US) matched by prefix</text>
    <text x="400" y="170">Fallback text</text>
  </switch>

  <!-- Test 7: No matching children renders nothing -->
  <text x="400" y="210" class="label">7. No match (nothing should render below):</text>
  <switch>
    <rect requiredExtensions="http://example.org/a" x="400" y="220" width="120" height="40" fill="red"/>
    <rect requiredExtensions="http://example.org/b" x="400" y="220" width="120" height="40" fill="red"/>
  </switch>
  <text x="400" y="280" fill="#666">(empty space above = correct)</text>

  <!-- Test 8: Switch with group child -->
  <text x="400" y="310" class="label">8. Switch with group child:</text>
  <switch>
    <g>
      <rect x="400" y="320" width="60" height="60" fill="blue"/>
      <rect x="470" y="320" width="60" height="60" fill="orange"/>
    </g>
  </switch>
  <text x="550" y="355" fill="#666">Both rects in group</text>

  <!-- Test 9: Multiple requiredFeatures (all must pass) -->
  <text x="400" y="410" class="label">9. Multiple features (all must pass):</text>
  <switch>
    <rect requiredFeatures="http://www.w3.org/TR/SVG11/feature#Shape http://www.w3.org/TR/SVG11/feature#Filter" x="400" y="420" width="120" height="60" fill="red"/>
    <rect x="400" y="420" width="120" height="60" fill="green"/>
  </switch>
  <text x="540" y="455" fill="#666">Green (Filter fails)</text>

  <!-- Test 10: Empty requiredFeatures evaluates to false -->
  <text x="20" y="470" class="label">10. Empty requiredFeatures (= false):</text>
  <switch>
    <rect requiredFeatures="" x="20" y="480" width="120" height="60" fill="red"/>
    <rect x="20" y="480" width="120" height="60" fill="green"/>
  </switch>
  <text x="160" y="515" fill="#666">Green (empty = false)</text>

  <!-- Test 11: Nested switch -->
  <text x="400" y="510" class="label">11. Nested switch:</text>
  <switch>
    <g>
      <switch>
        <rect requiredExtensions="http://example.org/x" x="400" y="520" width="60" height="60" fill="red"/>
        <rect x="400" y="520" width="60" height="60" fill="green"/>
      </switch>
      <switch>
        <rect requiredFeatures="http://www.w3.org/TR/SVG11/feature#Shape" x="470" y="520" width="60" height="60" fill="blue"/>
        <rect x="470" y="520" width="60" height="60" fill="red"/>
      </switch>
    </g>
  </switch>
  <text x="550" y="555" fill="#666">Green + Blue</text>
</svg>
