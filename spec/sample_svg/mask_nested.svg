<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <defs>
    <mask id="nested-mask">
      <g>
        <rect x="20" y="20" width="260" height="260" fill="white" rx="30"/>
        <circle cx="150" cy="150" r="50" fill="black"/>
      </g>
    </mask>
  </defs>

  <g mask="url(#nested-mask)">
    <rect width="300" height="150" fill="#e74c3c"/>
    <rect y="150" width="300" height="150" fill="#3498db"/>
  </g>
</svg>
