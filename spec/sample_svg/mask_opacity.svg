<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <defs>
    <mask id="gray25">
      <rect width="100" height="200" fill="#404040"/>
    </mask>
    <mask id="gray50">
      <rect width="100" height="200" fill="#808080"/>
    </mask>
    <mask id="gray75">
      <rect width="100" height="200" fill="#c0c0c0"/>
    </mask>
    <mask id="white">
      <rect width="100" height="200" fill="white"/>
    </mask>
  </defs>

  <rect x="0"   y="0" width="100" height="200" fill="#e74c3c" mask="url(#gray25)"/>
  <rect x="100" y="0" width="100" height="200" fill="#e74c3c" mask="url(#gray50)"/>
  <rect x="200" y="0" width="100" height="200" fill="#e74c3c" mask="url(#gray75)"/>
  <rect x="300" y="0" width="100" height="200" fill="#e74c3c" mask="url(#white)"/>
</svg>
