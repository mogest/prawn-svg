<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="red"/>
    </marker>
    <marker id="circle" viewBox="0 0 10 10" refX="5" refY="5"
            markerWidth="5" markerHeight="5">
      <circle cx="5" cy="5" r="4" fill="blue"/>
    </marker>
    <marker id="square" viewBox="0 0 10 10" refX="5" refY="5"
            markerWidth="5" markerHeight="5">
      <rect x="1" y="1" width="8" height="8" fill="green"/>
    </marker>
  </defs>

  <!-- marker shorthand sets all three markers -->
  <text x="10" y="25" font-size="14" fill="black">marker shorthand (all arrows)</text>
  <polyline points="30,60 100,40 170,70 240,50"
            fill="none" stroke="black" stroke-width="2"
            style="marker: url(#arrow)"/>

  <!-- marker shorthand with individual override -->
  <text x="10" y="115" font-size="14" fill="black">marker shorthand + marker-end override</text>
  <polyline points="30,150 100,130 170,160 240,140"
            fill="none" stroke="black" stroke-width="2"
            style="marker: url(#arrow)" marker-end="url(#circle)"/>

  <!-- marker shorthand via CSS style attribute -->
  <text x="10" y="205" font-size="14" fill="black">marker shorthand via style attribute</text>
  <polyline points="30,240 100,220 170,250 240,230"
            fill="none" stroke="black" stroke-width="2"
            style="marker: url(#circle)"/>

  <!-- marker shorthand via CSS stylesheet -->
  <style>
    .styled-line { marker: url(#square); }
  </style>
  <text x="10" y="295" font-size="14" fill="black">marker shorthand via CSS stylesheet</text>
  <polyline class="styled-line" points="30,330 100,310 170,340 240,320"
            fill="none" stroke="black" stroke-width="2"/>

  <!-- marker: none to clear -->
  <text x="10" y="375" font-size="14" fill="black">marker: none (no markers visible)</text>
  <polyline points="30,390 100,380 170,395 240,385"
            fill="none" stroke="black" stroke-width="2"
            marker-start="url(#arrow)" style="marker: none"/>
</svg>
