<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 300 300" version="1.1">
    <mask id="hello">
    <image width="300" height="300" xlink:href="data:image/png;base64," />
    </mask>

    <rect width="100%" height="100%" stroke="green" fill="none" />

    <rect width="100%" height="100%" fill="red" mask="url(#hello)" />

    <rect x="0" y="0" width="100" height="100" fill="blue" />
    <rect x="200" y="200" width="100" height="100" fill="blue" />
</svg>
